services:
  founderai:
    build: .
    container_name: founderai-openai
    environment:
      FOUNDERAI_PROVIDER: openai
      FOUNDERAI_BASE_URL: https://api.openai.com/v1
      FOUNDERAI_MODEL: gpt-5-mini
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./inbox:/app/inbox
      - ./outbox:/app/outbox
      - ./runtime:/app/runtime
      - ./docs:/app/docs:ro
      - ./documents/99_Agent_Ready:/app/documents/99_Agent_Ready:ro
      - ./founder-brain:/app/founder-brain:ro
      - ./config:/app/config:ro
    command: ["/app/founderai-ollama-rust", "daemon", "--config", "/app/config/founderai.json"]
    restart: unless-stopped
