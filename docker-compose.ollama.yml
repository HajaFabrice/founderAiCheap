services:
  ollama:
    image: ollama/ollama
    container_name: founderai-ollama
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  founderai:
    build: .
    container_name: founderai-app
    depends_on:
      - ollama
    environment:
      FOUNDERAI_PROVIDER: ollama
      FOUNDERAI_BASE_URL: http://ollama:11434
      FOUNDERAI_MODEL: qwen2.5:7b-instruct
    volumes:
      - ./inbox:/app/inbox
      - ./outbox:/app/outbox
      - ./runtime:/app/runtime
      - ./founder-brain:/app/founder-brain:ro
      - ./config:/app/config:ro
    command: ["/app/founderai-ollama-rust", "daemon", "--config", "/app/config/founderai.json"]
    restart: unless-stopped

volumes:
  ollama-data:
