<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — OPLURIX</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    background: #0F1A14;
    color: #FAFAF7;
    font-family: 'IBM Plex Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 2rem;
  }
  .wrap { max-width: 480px; }
  .code {
    font-size: 5rem;
    font-weight: 500;
    color: #E8B84B;
    line-height: 1;
    margin-bottom: 1rem;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: rgba(255,255,255,0.7);
    margin-bottom: 1rem;
    font-weight: 700;
  }
  p { font-size: 0.8rem; color: rgba(255,255,255,0.3); margin-bottom: 2rem; }
  a {
    display: inline-block;
    background: #B87A1A;
    color: #fff;
    text-decoration: none;
    padding: 11px 24px;
    border-radius: 4px;
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    transition: background 0.2s;
  }
  a:hover { background: #D4921F; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has moved.</p>
    <a href="/">← Back to OPLURIX</a>
  </div>
</body>
</html>
