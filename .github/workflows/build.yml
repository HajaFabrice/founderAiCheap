name: Build

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --release -- -D warnings

      - name: Build release binary
        run: cargo build --release

      - name: Run tests
        run: cargo test --release
