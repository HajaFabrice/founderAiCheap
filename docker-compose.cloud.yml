services:
  founderai-daemon:
    build: .
    container_name: founderai-daemon
    env_file:
      - .env.cloud
    volumes:
      - /srv/founderai/inbox:/srv/founderai/inbox
      - /srv/founderai/outbox:/srv/founderai/outbox
      - /srv/founderai/runtime:/srv/founderai/runtime
      - /srv/founderai/founder-brain:/srv/founderai/founder-brain
      - /srv/founderai/docs:/srv/founderai/docs:ro
      - /srv/founderai/documents/99_Agent_Ready:/srv/founderai/documents/99_Agent_Ready:ro
      - /srv/founderai/config:/srv/founderai/config
    command:
      - /app/founderai-ollama-rust
      - daemon
      - --config
      - /srv/founderai/config/founderai.cloud.json
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - /app/founderai-ollama-rust
        - status
        - --config
        - /srv/founderai/config/founderai.cloud.json
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 20s

  founderai-web:
    build: .
    container_name: founderai-web
    env_file:
      - .env.cloud
    volumes:
      - /srv/founderai/inbox:/srv/founderai/inbox
      - /srv/founderai/outbox:/srv/founderai/outbox
      - /srv/founderai/runtime:/srv/founderai/runtime
      - /srv/founderai/founder-brain:/srv/founderai/founder-brain
      - /srv/founderai/docs:/srv/founderai/docs:ro
      - /srv/founderai/documents/99_Agent_Ready:/srv/founderai/documents/99_Agent_Ready:ro
      - /srv/founderai/config:/srv/founderai/config
    command:
      - /app/founderai-ollama-rust
      - serve
      - --listen
      - 0.0.0.0:8080
      - --config
      - /srv/founderai/config/founderai.cloud.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: founderai-cloudflared
    env_file:
      - .env.cloud
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      founderai-web:
        condition: service_started
    restart: unless-stopped
